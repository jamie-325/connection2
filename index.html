<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Piano AR - Passthrough Fix</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>
<body>

    <a-scene 
        webxr="optionalFeatures: passthrough, local-floor; overlayElement: #desktop-ui"
        background="color: #010102"
        renderer="alpha: true; antialias: true;">
        
        <a-assets>
            <a-mixin id="vr-btn" 
                     geometry="primitive: plane; width: 0.6; height: 0.22" 
                     material="color: #111; shader: flat"
                     event-set__mouseenter="material.color: #39FF14"
                     event-set__mouseleave="material.color: #111"
                     text="align: center; width: 2.5; color: white"></a-mixin>
        </a-assets>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

        <a-entity id="vr-menu" position="-3.5 1.5 -3.0" rotation="0 70 0">
            <a-text value="REALITY SETTINGS" position="0 0.8 0" align="center" color="#39FF14" width="6"></a-text>
            
            <a-entity class="clickable" mixin="vr-btn" position="0 0.4 0" 
                      text="value: TOGGLE PASSTHROUGH" onclick="toggleVRAR()"></a-entity>

            <a-entity class="clickable" mixin="vr-btn" position="0 0.1 0" text="value: C MAJOR" onclick="selectScale('cMajor')"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0 -0.8 0" material="color: #500" text="value: STOP" onclick="stopAll()"></a-entity>
        </a-entity>

        <a-entity id="piano-rig" position="0 0.5 -1.8">
            <a-entity id="rolls"></a-entity>
            <a-entity id="keys"></a-entity>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        let isAR = false;

        function toggleVRAR() {
            const sceneEl = document.querySelector('a-scene');
            isAR = !isAR;

            if (isAR) {
                // 1. Make the virtual sky invisible so the camera feed shows through
                sceneEl.setAttribute('background', 'transparent', true);
                
                // 2. Request the Meta Quest hardware to start passthrough
                if (sceneEl.xrSession) {
                    sceneEl.xrSession.requestReferenceSpace('local').then((refSpace) => {
                        // This internal Meta command triggers the passthrough layer
                        sceneEl.setAttribute('webxr', 'optionalFeatures: passthrough;');
                    });
                }
                console.log("Entering Passthrough Mode");
            } else {
                // Return to Black VR Void
                sceneEl.setAttribute('background', 'color: #010102');
                console.log("Returning to VR Mode");
            }
        }

        // Standard Key Builder (Ensuring visibility)
        function buildKeys() {
            let curX = 0;
            const keysEl = document.getElementById('keys');
            for(let n=21; n<=108; n++) {
                const isB = [1,3,6,8,10].includes(n%12);
                const k = document.createElement('a-box');
                k.setAttribute('width', isB ? 0.045 : 0.08);
                k.setAttribute('height', isB ? 0.12 : 0.08);
                k.setAttribute('depth', isB ? 0.4 : 0.7);
                k.setAttribute('material', 'shader: flat; color: ' + (isB ? '#111' : '#fff'));
                k.setAttribute('position', `${curX} 0 ${isB ? -0.15 : 0}`);
                keysEl.appendChild(k);
                if(!isB) curX += 0.085;
            }
            keysEl.setAttribute('position', `${-(curX/2)} 0 0`);
        }

        window.onload = buildKeys;
    </script>
</body>
</html>
