<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Piano AR - True Passthrough</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #desktop-ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #39FF14;
            color: white; pointer-events: auto;
        }
    </style>
</head>
<body>

    <a-scene 
        id="scene"
        webxr="optionalFeatures: passthrough, local-floor; referenceSpaceType: local-floor"
        renderer="alpha: true; colorManagement: true;"
        xr-mode-ui="XRMode: ar; enterAREnabled: true;"
        background="color: #000">
        
        <a-assets>
            <a-mixin id="vr-btn" 
                     geometry="primitive: plane; width: 0.6; height: 0.22" 
                     material="color: #111; shader: flat"
                     text="align: center; width: 2.5; color: white"></a-mixin>
        </a-assets>

        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

        <a-entity id="vr-menu" position="-3.5 1.5 -3.0" rotation="0 70 0">
            <a-text value="PIANO AR CONTROLS" position="0 0.8 0" align="center" color="#39FF14" width="6"></a-text>
            
            <a-entity class="clickable" mixin="vr-btn" position="0 0.4 0" 
                      text="value: HIDE BACKGROUND" onclick="setPassthrough(true)"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0 0.1 0" 
                      text="value: SHOW BACKGROUND" onclick="setPassthrough(false)"></a-entity>

            <a-entity class="clickable" mixin="vr-btn" position="0 -0.5 0" material="color: #500" text="value: STOP" onclick="stopAll()"></a-entity>
        </a-entity>

        <a-entity id="piano-rig" position="0 0.5 -1.8">
            <a-entity id="rolls"></a-entity>
            <a-entity id="keys"></a-entity>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // This function handles the transparency of the virtual world
        function setPassthrough(active) {
            const sceneEl = document.querySelector('a-scene');
            if (active) {
                // Remove the background color so the AR camera feed is visible
                sceneEl.removeAttribute('background');
            } else {
                // Restore the black void
                sceneEl.setAttribute('background', 'color: #000');
            }
        }

        // Ensuring the system attempts AR session on start
        document.querySelector('a-scene').addEventListener('enter-vr', () => {
            const sceneEl = document.querySelector('a-scene');
            // If the user entered using the AR button, we clear the background immediately
            if (sceneEl.is('ar-mode')) {
                setPassthrough(true);
            }
        });

        function buildKeys() {
            let curX = 0;
            const keysEl = document.getElementById('keys');
            for(let n=21; n<=108; n++) {
                const isB = [1,3,6,8,10].includes(n%12);
                const k = document.createElement('a-box');
                k.setAttribute('width', isB ? 0.045 : 0.08);
                k.setAttribute('height', isB ? 0.12 : 0.08);
                k.setAttribute('depth', isB ? 0.4 : 0.7);
                // In AR, 'flat' shaders look much better because they don't depend on room lighting
                k.setAttribute('material', `shader: flat; color: ${isB ? '#111' : '#fff'}; opacity: 0.9;`);
                k.setAttribute('position', `${curX} 0 ${isB ? -0.15 : 0}`);
                keysEl.appendChild(k);
                if(!isB) curX += 0.085;
            }
            keysEl.setAttribute('position', `${-(curX/2)} 0 0`);
        }

        window.onload = buildKeys;
    </script>
</body>
</html>
