<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Sync Test</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.85);
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    pointer-events: none;
  }
  #hud > * { pointer-events: all; }

  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #333;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    font-size: 0.72rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.on  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .dot.err { background: #ef4444; }

  .btn {
    padding: 5px 14px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #111;
    color: #e0e0e0;
    font: 700 0.72rem 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.1s;
  }
  .btn:hover { background: #222; border-color: #666; }
  .btn.active { border-color: #22c55e; color: #22c55e; }

  #log {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
    padding: 6px 16px;
    background: rgba(0,0,0,0.8);
    font: 0.68rem 'Courier New', monospace;
    color: #555;
    pointer-events: none;
  }
  #log span { color: #facc15; }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="pill">
    <div class="dot" id="ws-dot"></div>
    <span id="ws-label">connecting…</span>
  </div>

  <div class="pill">
    <div class="dot on" style="background:#38bdf8;box-shadow:0 0 6px #38bdf8"></div>
    <span id="peer-count">0 peers</span>
  </div>

  <!-- Cube colour pickers -->
  <button class="btn" onclick="send('cubeColor','#e74c3c')" style="border-color:#e74c3c;color:#e74c3c;">RED</button>
  <button class="btn" onclick="send('cubeColor','#3498db')" style="border-color:#3498db;color:#3498db;">BLUE</button>
  <button class="btn" onclick="send('cubeColor','#2ecc71')" style="border-color:#2ecc71;color:#2ecc71;">GREEN</button>
  <button class="btn" onclick="send('cubeColor','#f39c12')" style="border-color:#f39c12;color:#f39c12;">ORANGE</button>
  <button class="btn" onclick="send('cubeColor','#9b59b6')" style="border-color:#9b59b6;color:#9b59b6;">PURPLE</button>

  <!-- Toggle rotation -->
  <button class="btn" id="rot-btn" onclick="toggleRotation()">⟳ SPIN: ON</button>

  <!-- Sky colour -->
  <button class="btn" onclick="send('skyColor','#1a1a2e')">SKY: NIGHT</button>
  <button class="btn" onclick="send('skyColor','#0f3460')">SKY: DEEP</button>
  <button class="btn" onclick="send('skyColor','#2d6a4f')">SKY: FOREST</button>
</div>

<!-- Status bar -->
<div id="log">Waiting for server… <span id="last-event"></span></div>


<!-- ════════════════════════════════ A-FRAME SCENE ════ -->
<a-scene xr-mode-ui="enabled: true">

  <a-camera position="0 1.6 4">
    <a-cursor raycaster="objects: .clickable"
      geometry="primitive:ring; radiusInner:0.01; radiusOuter:0.016"
      material="color:#facc15; shader:flat; opacity:0.9">
    </a-cursor>
  </a-camera>

  <!-- VR controllers -->
  <a-entity laser-controls="hand:left"
    raycaster="objects:.clickable; far:10; showLine:true; lineColor:#facc15; lineOpacity:0.7">
  </a-entity>
  <a-entity laser-controls="hand:right"
    raycaster="objects:.clickable; far:10; showLine:true; lineColor:#fff; lineOpacity:0.7">
  </a-entity>

  <!-- The shared cube — clicking it cycles its colour -->
  <a-box id="shared-cube"
    class="clickable"
    position="0 1.5 -3"
    width="1" height="1" depth="1"
    color="#e74c3c"
    animation="property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear">
  </a-box>

  <!-- Label above cube -->
  <a-text id="cube-label"
    value="CLICK ME"
    position="0 2.3 -3"
    align="center"
    color="#ffffff"
    width="4">
  </a-text>

  <!-- Connection status sphere (green=connected, red=disconnected) -->
  <a-sphere id="status-sphere"
    position="-3 1.5 -4"
    radius="0.2"
    color="#ef4444">
  </a-sphere>
  <a-text value="SYNC STATUS"
    position="-3 1.9 -4"
    align="center" color="#aaa" width="3">
  </a-text>

  <!-- Peer count display in 3D -->
  <a-text id="vr-peer-count"
    value="0 peers"
    position="3 1.9 -4"
    align="center" color="#38bdf8" width="4">
  </a-text>

  <!-- Colour buttons in 3D (for VR use) -->
  <a-box class="clickable" id="vr-red"
    position="-1.5 0.4 -3" width="0.5" height="0.3" depth="0.1"
    color="#e74c3c"></a-box>
  <a-text value="RED" position="-1.5 0.45 -2.94" align="center" color="#fff" width="1.5"></a-text>

  <a-box class="clickable" id="vr-blue"
    position="-0.8 0.4 -3" width="0.5" height="0.3" depth="0.1"
    color="#3498db"></a-box>
  <a-text value="BLUE" position="-0.8 0.45 -2.94" align="center" color="#fff" width="1.5"></a-text>

  <a-box class="clickable" id="vr-green"
    position="-0.1 0.4 -3" width="0.5" height="0.3" depth="0.1"
    color="#2ecc71"></a-box>
  <a-text value="GREEN" position="-0.1 0.45 -2.94" align="center" color="#fff" width="1.5"></a-text>

  <a-box class="clickable" id="vr-orange"
    position=" 0.6 0.4 -3" width="0.5" height="0.3" depth="0.1"
    color="#f39c12"></a-box>
  <a-text value="ORANGE" position=" 0.6 0.45 -2.94" align="center" color="#fff" width="1.5"></a-text>

  <a-box class="clickable" id="vr-purple"
    position=" 1.3 0.4 -3" width="0.5" height="0.3" depth="0.1"
    color="#9b59b6"></a-box>
  <a-text value="PURPLE" position=" 1.3 0.45 -2.94" align="center" color="#fff" width="1.5"></a-text>

  <!-- Floor -->
  <a-plane rotation="-90 0 0" width="20" height="20"
    material="color:#0d0d1a; roughness:0.9">
  </a-plane>

  <a-sky id="shared-sky" color="#1a1a2e"></a-sky>

</a-scene>


<script>
// ─────────────────────────────────────────────────────────────
//  WebSocket sync
//  The server address is just window.location — no config needed.
//  Works on localhost AND on your DuckDNS domain.
// ─────────────────────────────────────────────────────────────

const WS_URL = `ws://${location.hostname}:${location.port || 3000}`;

let ws, reconnectTimer;
const COLOURS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
let colourIdx = 0;

// DOM / A-Frame element refs
const cube        = document.getElementById('shared-cube');
const sky         = document.getElementById('shared-sky');
const statusSph   = document.getElementById('status-sphere');
const vrPeerCount = document.getElementById('vr-peer-count');
const wsDot       = document.getElementById('ws-dot');
const wsLabel     = document.getElementById('ws-label');
const peerCount   = document.getElementById('peer-count');
const lastEvent   = document.getElementById('last-event');
const rotBtn      = document.getElementById('rot-btn');

// ── Apply state received from server ─────────────────────────
function applyState(data) {
  if (data.cubeColor    !== undefined) setCubeColor(data.cubeColor);
  if (data.cubeRotating !== undefined) setRotation(data.cubeRotating);
  if (data.skyColor     !== undefined) setSkyColor(data.skyColor);
}

function setCubeColor(color) {
  cube.setAttribute('color', color);
  logEvent(`cube → ${color}`);
}

function setRotation(on) {
  cube.setAttribute('animation', on
    ? 'property:rotation; to:0 360 0; dur:4000; loop:true; easing:linear'
    : 'property:rotation; to:0 0 0; dur:300; loop:false');
  rotBtn.textContent = `⟳ SPIN: ${on ? 'ON' : 'OFF'}`;
  rotBtn.classList.toggle('active', on);
}

function setSkyColor(color) {
  sky.setAttribute('color', color);
  logEvent(`sky → ${color}`);
}

function logEvent(msg) {
  lastEvent.textContent = msg;
}

// ── Send a state update to the server ────────────────────────
function send(key, value) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'update', data: { [key]: value } }));
  // Apply locally immediately (optimistic update)
  applyState({ [key]: value });
}

function toggleRotation() {
  const current = cube.getAttribute('animation');
  const isOn = current && current.includes('loop:true');
  send('cubeRotating', !isOn);
}

// ── Connect / reconnect loop ─────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    wsDot.className = 'dot on';
    wsLabel.textContent = 'connected';
    statusSph.setAttribute('color', '#22c55e');
    logEvent('connected to server');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'init') {
      // Full state on first connect
      applyState(msg.state);
      updatePeerCount(msg.state.clients);
    }

    if (msg.type === 'update') {
      // Partial update from another peer
      applyState(msg.data);
      logEvent(`peer update: ${JSON.stringify(msg.data)}`);
    }

    if (msg.type === 'clients') {
      updatePeerCount(msg.count);
    }
  };

  ws.onclose = () => {
    wsDot.className = 'dot err';
    wsLabel.textContent = 'disconnected — retrying…';
    statusSph.setAttribute('color', '#ef4444');
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => {
    wsDot.className = 'dot err';
    wsLabel.textContent = 'error';
  };
}

function updatePeerCount(n) {
  const label = `${n} peer${n === 1 ? '' : 's'}`;
  peerCount.textContent = label;
  vrPeerCount.setAttribute('text', 'value', label);
}

// ── Clicking the shared cube cycles its colour ───────────────
cube.addEventListener('click', () => {
  colourIdx = (colourIdx + 1) % COLOURS.length;
  send('cubeColor', COLOURS[colourIdx]);
});

// ── VR colour button wiring ───────────────────────────────────
document.getElementById('vr-red'   ).addEventListener('click', () => send('cubeColor', '#e74c3c'));
document.getElementById('vr-blue'  ).addEventListener('click', () => send('cubeColor', '#3498db'));
document.getElementById('vr-green' ).addEventListener('click', () => send('cubeColor', '#2ecc71'));
document.getElementById('vr-orange').addEventListener('click', () => send('cubeColor', '#f39c12'));
document.getElementById('vr-purple').addEventListener('click', () => send('cubeColor', '#9b59b6'));

// ── Go ────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
