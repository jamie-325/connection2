<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Virtuoso VR - Passthrough Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #desktop-ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #39FF14;
            color: white; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="desktop-ui">
        <button onclick="togglePassthrough()">Toggle Passthrough (Desktop Test)</button>
    </div>

    <a-scene 
        id="mainScene"
        background="color: #010102" 
        renderer="alpha: true; colorManagement: true;"
        xr-mode-ui="enabled: true">
        
        <a-assets>
            <a-mixin id="vr-btn" 
                     geometry="primitive: plane; width: 0.6; height: 0.2" 
                     material="color: #111; shader: flat"
                     text="align: center; width: 2.5; color: white"></a-mixin>
        </a-assets>

        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

        <a-entity id="vr-menu" position="-3.5 1.5 -3.0" rotation="0 70 0">
            <a-text value="ENVIRONMENT" position="0 0.4 0" align="center" color="#39FF14"></a-text>
            
            <a-entity id="passthrough-btn" class="clickable" mixin="vr-btn" 
                      position="0 0.1 0" 
                      text="value: TOGGLE PASSTHROUGH" 
                      onclick="togglePassthrough()"></a-entity>

            <a-entity class="clickable" mixin="vr-btn" position="0 -0.2 0" text="value: C MAJOR" onclick="selectScale('cMajor')"></a-entity>
        </a-entity>

        <a-entity id="piano-rig" position="0 0.5 -1.5">
            <a-entity id="rolls"></a-entity>
            <a-entity id="keys"></a-entity>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        let isPassthroughOn = false;

        function togglePassthrough() {
            const sceneEl = document.querySelector('a-scene');
            const btn = document.querySelector('#passthrough-btn');
            
            isPassthroughOn = !isPassthroughOn;

            if (isPassthroughOn) {
                // 1. Hide the background color
                sceneEl.setAttribute('background', 'transparent', true);
                // 2. Set the renderer to alpha (for WebXR AR mode)
                sceneEl.setAttribute('renderer', 'alpha', true);
                
                // For Meta Quest Browser specifically:
                if (sceneEl.systems.webxr) {
                    sceneEl.setAttribute('webxr', 'optionalFeatures: passthrough;');
                }
                
                console.log("Passthrough Active");
            } else {
                // Return to the black void
                sceneEl.setAttribute('background', 'color: #010102');
                console.log("Passthrough Disabled");
            }
        }

        // Standard Keyboard logic (Keep your previous functions here)
        function buildKeys() {
            const keysEl = document.getElementById('keys');
            let curX = 0;
            for(let n=21; n<=108; n++) {
                const isB = [1,3,6,8,10].includes(n%12);
                const k = document.createElement('a-box');
                k.setAttribute('width', isB ? 0.045 : 0.08);
                k.setAttribute('height', isB ? 0.12 : 0.08);
                k.setAttribute('depth', isB ? 0.4 : 0.7);
                k.setAttribute('color', isB ? '#111' : '#fff');
                k.setAttribute('position', `${curX} 0 ${isB ? -0.15 : 0}`);
                keysEl.appendChild(k);
                if(!isB) curX += 0.085;
            }
        }

        window.onload = buildKeys;
    </script>
</body>
</html>
